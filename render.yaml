services:
  - type: web
    name: room-booking
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER_DATA_DIR
        value: /opt/render/project/data
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/data
      sizeGB: 1
