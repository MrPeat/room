services:
  app:
    build: .
    container_name: "g07_app"
    ports:
      - "3000:3000"
    env_file:
      - ".env"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: "g07_db"
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: room_booking
      MYSQL_USER: room_user
      MYSQL_PASSWORD: room_password
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
