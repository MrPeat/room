<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>หน้าหลัก | ระบบจองห้องประชุม ทักษิณ</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ── Booking Modal ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; justify-content:center; align-items:center; backdrop-filter:blur(4px); }
    .modal-overlay.active { display:flex; }
    .modal { background:var(--color-surface-card); border:1px solid var(--color-hairline); width:100%; max-width:520px; margin: var(--space-lg); padding:0; }
    .modal-header { padding:var(--space-lg); border-bottom:1px solid var(--color-hairline); display:flex; align-items:center; justify-content:space-between; }
    .modal-header h3 { font-family:var(--font-display); font-size:14px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--color-on-dark); margin:0; }
    .modal-header .close-btn { background:none; border:none; color:var(--color-muted); font-size:24px; cursor:pointer; line-height:1; }
    .modal-header .close-btn:hover { color:var(--color-on-dark); }
    .modal-body { padding:var(--space-lg); }
    .modal-footer { padding:var(--space-lg); border-top:1px solid var(--color-hairline); display:flex; gap:var(--space-md); justify-content:flex-end; }
    .booking-summary { display:grid; grid-template-columns:auto 1fr; gap:var(--space-xs) var(--space-lg); margin-bottom:var(--space-lg); }
    .booking-summary dt { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--color-muted); padding: var(--space-xxs) 0; }
    .booking-summary dd { font-size:14px; font-weight:300; color:var(--color-on-dark); padding: var(--space-xxs) 0; margin:0; }
    /* ── User Welcome ── */
    .user-welcome { display:flex; align-items:center; gap:var(--space-xs); }
    .user-avatar { width:32px; height:32px; border-radius:var(--rounded-full); background:var(--color-surface-elevated); border:1px solid var(--color-hairline); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--color-on-dark); }
    .user-info { display:flex; flex-direction:column; }
    .user-name { font-size:12px; font-weight:700; color:var(--color-on-dark); letter-spacing:0.5px; }
    .user-role { font-size:10px; color:var(--color-muted); text-transform:uppercase; letter-spacing:1px; }
    /* ── Stats ── */
    .stats-strip { display:flex; gap:var(--space-lg); margin-top: var(--space-md); }
    .stat-item { display:flex; align-items:baseline; gap:var(--space-xs); }
    .stat-value { font-size:28px; font-weight:700; color:var(--color-on-dark); }
    .stat-label { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--color-muted); }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="brand-logo">
        <span class="m-stripe-sm" style="width: 24px; height: 3px;"><span></span></span>
        <div class="brand-mark">TSU</div>
      </div>
      <div class="brand-sub">ระบบจองห้องประชุม</div>
    </div>
    <div class="nav-actions">
      <div class="user-welcome" id="userWelcome" style="display:none;">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info">
          <span class="user-name" id="userName">–</span>
          <span class="user-role" id="userRole">–</span>
        </div>
      </div>
      <a href="/student.html" class="text-link" style="font-size: 12px; margin-right: 8px;" id="dashboardLink">การจองของฉัน</a>
      <button class="button secondary sm" id="logoutBtn">ออกจากระบบ</button>
    </div>
  </div>

  <div class="hero-band">
    <img src="/hero-conference.png" alt="Conference Room" class="hero-bg" />
    <div class="hero-content">
      <h1 class="fade-in-up" style="font-family:var(--font-display); font-size:56px; font-weight:700; line-height:1.05; letter-spacing:-0.5px; color:var(--color-on-dark); text-transform:uppercase;">The Ultimate<br>Meeting Space.</h1>
      <p class="fade-in-up" style="animation-delay: 0.1s;">ค้นหาและจองห้องประชุม มหาวิทยาลัยทักษิณ วิทยาเขตพัทลุง</p>
      <div class="stats-strip fade-in-up" style="animation-delay: 0.2s;" id="statsStrip"></div>
    </div>
  </div>

  <div class="container section">
    <div class="panel fade-in-up" style="animation-delay: 0.2s;">
      <h2 class="panel-title">ค้นหาห้องว่าง</h2>
      <div class="search-group">
        <div class="field">
          <label for="search">คำค้นหา</label>
          <input id="search" placeholder="ชื่อห้อง, ตำแหน่ง หรือความจุ" />
        </div>
        <div class="field">
          <label for="start">เริ่มต้น</label>
          <input type="datetime-local" id="start" />
        </div>
        <div class="field">
          <label for="end">สิ้นสุด</label>
          <input type="datetime-local" id="end" />
        </div>
        <button class="button primary" id="searchBtn">ค้นหา</button>
      </div>
    </div>

    <div class="section-header fade-in-up" style="animation-delay: 0.3s; margin-top: var(--space-xl);">
      <h2 class="section-title">ห้องประชุมทั้งหมด</h2>
      <span id="roomCount" style="font-size:12px; color:var(--color-muted); letter-spacing:1px; text-transform:uppercase;"></span>
    </div>

    <div class="room-list" id="roomList"></div>
  </div>

  <!-- ═══ Booking Confirmation Modal ═══ -->
  <div class="modal-overlay" id="bookingModal">
    <div class="modal">
      <div class="modal-header">
        <h3>ยืนยันการจอง</h3>
        <button class="close-btn" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <dl class="booking-summary">
          <dt>ห้อง</dt>
          <dd id="modalRoom">–</dd>
          <dt>ตำแหน่ง</dt>
          <dd id="modalLocation">–</dd>
          <dt>วันเริ่มต้น</dt>
          <dd id="modalStart">–</dd>
          <dt>วันสิ้นสุด</dt>
          <dd id="modalEnd">–</dd>
          <dt>ผู้จอง</dt>
          <dd id="modalBooker">–</dd>
        </dl>
        <div class="field">
          <label for="bookingNote">หมายเหตุ (ไม่จำเป็น)</label>
          <input id="bookingNote" placeholder="เช่น ประชุมกลุ่มวิชา, อบรมเชิงปฏิบัติการ" />
        </div>
        <div class="message" id="modalMessage"></div>
      </div>
      <div class="modal-footer">
        <button class="button secondary" id="modalCancel">ยกเลิก</button>
        <button class="button primary" id="modalConfirm">ยืนยันจอง</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="m-stripe" style="margin-bottom: var(--space-xl);"><span></span></div>
    <p>&copy; 2026 มหาวิทยาลัยทักษิณ วิทยาเขตพัทลุง. สงวนลิขสิทธิ์.</p>
  </div>

  <script>
    const roomList = document.getElementById('roomList');
    const searchInput = document.getElementById('search');
    const startInput = document.getElementById('start');
    const endInput = document.getElementById('end');
    const searchBtn = document.getElementById('searchBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    let currentUser = null;
    let selectedRoom = null;

    // ── Load user info ──
    async function loadUser() {
      try {
        const res = await fetch('/api/me');
        if (!res.ok) { window.location.href = '/login.html'; return; }
        currentUser = await res.json();
        
        // Show welcome
        const welcome = document.getElementById('userWelcome');
        welcome.style.display = 'flex';
        document.getElementById('userName').textContent = currentUser.full_name;
        const roleLabels = { student: 'นิสิต', staff: 'บุคลากร', admin: 'ผู้ดูแลระบบ' };
        document.getElementById('userRole').textContent = roleLabels[currentUser.role] || currentUser.role;
        document.getElementById('userAvatar').textContent = currentUser.full_name.charAt(0).toUpperCase();

        // Admin link
        const dashboardLink = document.getElementById('dashboardLink');
        if (currentUser.role === 'admin') {
          dashboardLink.href = '/admin.html';
          dashboardLink.textContent = 'หน้าผู้ดูแลระบบ';
        }
      } catch (e) {
        window.location.href = '/login.html';
      }
    }

    // ── Stats ──
    async function loadStats() {
      try {
        const res = await fetch('/api/rooms');
        const rooms = await res.json();
        const totalRooms = rooms.length;
        const totalCapacity = rooms.reduce((s, r) => s + r.capacity, 0);
        document.getElementById('statsStrip').innerHTML = `
          <div class="stat-item"><span class="stat-value">${totalRooms}</span><span class="stat-label">ห้อง</span></div>
          <div class="stat-item"><span class="stat-value">${totalCapacity.toLocaleString()}</span><span class="stat-label">ที่นั่ง</span></div>
        `;
      } catch (e) {}
    }

    // ── DateTime ──
    function setMinDateTime() {
      const now = new Date();
      const offset = now.getTimezoneOffset();
      const local = new Date(now.getTime() - offset * 60000);
      const minStr = local.toISOString().slice(0, 16);
      startInput.setAttribute('min', minStr);
      endInput.setAttribute('min', minStr);
    }
    setMinDateTime();
    setInterval(setMinDateTime, 60000);

    startInput.addEventListener('change', () => {
      if (startInput.value) {
        endInput.setAttribute('min', startInput.value);
        if (endInput.value && endInput.value <= startInput.value) endInput.value = '';
      }
    });

    function validateDates() {
      const start = startInput.value;
      const end = endInput.value;
      if (!start || !end) { alert('กรุณาเลือกช่วงเวลา'); return false; }
      if (new Date(start) < new Date()) { alert('ไม่สามารถจองวันที่ผ่านมาแล้วได้'); return false; }
      if (new Date(end) <= new Date(start)) { alert('วันสิ้นสุดต้องอยู่หลังวันเริ่มต้น'); return false; }
      if (new Date(end).getTime() - new Date(start).getTime() > 24 * 60 * 60 * 1000) { alert('ไม่สามารถจองห้องต่อเนื่องเกิน 24 ชั่วโมงได้'); return false; }
      return true;
    }

    // ── Rooms ──
    async function loadRooms() {
      const search = searchInput.value.trim();
      const start = startInput.value;
      const end = endInput.value;
      const params = new URLSearchParams();
      if (search) params.append('search', search);
      if (start && end) {
        params.append('status', 'available');
        params.append('start', new Date(start).toISOString());
        params.append('end', new Date(end).toISOString());
      }
      const res = await fetch(`/api/rooms?${params.toString()}`);
      const rooms = await res.json();
      document.getElementById('roomCount').textContent = `${rooms.length} ห้อง`;
      renderRooms(rooms);
    }

    function renderRooms(rooms) {
      roomList.innerHTML = '';
      if (rooms.length === 0) {
        roomList.innerHTML = '<div class="panel" style="grid-column: 1 / -1;"><p style="text-align:center; color:var(--color-muted);">ไม่พบห้องที่ตรงกับคำค้นหา</p></div>';
        return;
      }
      rooms.forEach((room, index) => {
        const card = document.createElement('div');
        card.className = 'room-card';
        card.style.animationDelay = `${0.05 * (index + 1)}s`;
        card.innerHTML = `
          <div class="card-body">
            <div class="card-tag">Room ${room.id.toString().padStart(3, '0')}</div>
            <h3>${room.name}</h3>
            <div class="room-capacity">${room.capacity} คน</div>
            <div class="room-meta">
              <p><strong>ตำแหน่ง:</strong> ${room.location}</p>
              <p>${room.description || ''}</p>
            </div>
            <div class="card-action">
              <button class="button primary" data-room="${room.id}">จองห้องนี้</button>
            </div>
          </div>
        `;
        card.querySelector('button').addEventListener('click', () => openBookingModal(room));
        roomList.appendChild(card);
      });
    }

    // ── Booking Modal ──
    function formatDateThai(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('th-TH', { weekday:'long', year:'numeric', month:'long', day:'numeric' }) 
        + ' เวลา ' + d.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' }) + ' น.';
    }

    function openBookingModal(room) {
      if (!validateDates()) return;
      if (!currentUser || currentUser.role === 'admin') {
        alert('กรุณาเข้าสู่ระบบด้วยบัญชีนิสิตหรือบุคลากรเพื่อจอง');
        return;
      }
      selectedRoom = room;
      document.getElementById('modalRoom').textContent = room.name;
      document.getElementById('modalLocation').textContent = room.location;
      document.getElementById('modalStart').textContent = formatDateThai(startInput.value);
      document.getElementById('modalEnd').textContent = formatDateThai(endInput.value);
      document.getElementById('modalBooker').textContent = `${currentUser.full_name} (${currentUser.user_id})`;
      document.getElementById('modalMessage').textContent = '';
      document.getElementById('bookingNote').value = '';
      document.getElementById('bookingModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('bookingModal').classList.remove('active');
      selectedRoom = null;
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('bookingModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    document.getElementById('modalConfirm').addEventListener('click', async () => {
      if (!selectedRoom || !currentUser) return;
      const msgEl = document.getElementById('modalMessage');
      msgEl.textContent = '';

      const body = {
        roomId: selectedRoom.id,
        start: new Date(startInput.value).toISOString(),
        end: new Date(endInput.value).toISOString(),
        note: document.getElementById('bookingNote').value.trim()
      };

      try {
        const res = await fetch('/api/bookings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok || data.error) {
          msgEl.textContent = data.error || 'เกิดข้อผิดพลาด';
          return;
        }
        closeModal();
        alert('✓ จองสำเร็จ! รหัสการจอง: #' + data.id);
        loadRooms();
      } catch (e) {
        msgEl.textContent = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้';
      }
    });

    // ── Events ──
    logoutBtn.addEventListener('click', async () => {
      await fetch('/api/logout');
      window.location.href = '/login.html';
    });

    searchBtn.addEventListener('click', () => {
      const start = startInput.value;
      const end = endInput.value;
      if (start && end) {
        if (new Date(start) < new Date()) return alert('ไม่สามารถค้นหาห้องว่างในวันที่ผ่านมาแล้วได้');
        if (new Date(end) <= new Date(start)) return alert('วันสิ้นสุดต้องอยู่หลังวันเริ่มต้น');
        if (new Date(end).getTime() - new Date(start).getTime() > 24 * 60 * 60 * 1000) return alert('ไม่สามารถค้นหาช่วงเวลาที่เกิน 24 ชั่วโมงได้');
      }
      loadRooms();
    });

    // ── Init ──
    loadUser();
    loadStats();
    loadRooms();
  </script>
  <script src="/app.js"></script>
</body>
</html>
